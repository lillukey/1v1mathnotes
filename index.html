<body>

	<!-- ==================== FULLSCREEN UTILITIES ==================== -->
	<script>
		var isIframe = (window.self !== window.top);
		var elem = document.documentElement;
		// Request fullscreen with cross-browser compatibility
		function openFullscreen() {
			if (elem.requestFullscreen) {
				elem.requestFullscreen();
			} else if (elem.mozRequestFullScreen) { /* Firefox */
				elem.mozRequestFullScreen();
			} else if (elem.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
				elem.webkitRequestFullscreen();
			} else if (elem.msRequestFullscreen) { /* IE/Edge */
				elem.msRequestFullscreen();
			}
		}

		// Exit fullscreen with cross-browser compatibility
		function closeFullscreen() {
			if (document.exitFullscreen) {
				document.exitFullscreen();
			} else if (document.mozCancelFullScreen) { /* Firefox */
				document.mozCancelFullScreen();
			} else if (document.webkitExitFullscreen) { /* Chrome, Safari and Opera */
				document.webkitExitFullscreen();
			} else if (document.msExitFullscreen) { /* IE/Edge */
				document.msExitFullscreen();
			}
		}

		// Toggle fullscreen mode
		function updateFullscreen() {
			var isInFullScreen = (document.fullscreenElement && document.fullscreenElement !== null) ||
				(document.webkitFullscreenElement && document.webkitFullscreenElement !== null) ||
				(document.mozFullScreenElement && document.mozFullScreenElement !== null) ||
				(document.msFullscreenElement && document.msFullscreenElement !== null);
			if (!isInFullScreen)
				openFullscreen();
			else
				closeFullscreen();
		}

		var elem = document.documentElement;
	</script>

	<!-- ==================== NETWORK & STATIC ASSET CONFIGURATION ==================== -->
	<script>

					break;
				default:
					prefix = split[0];
			}
			return new(Function.prototype.bind.call(window.rWS, null, (split[1].match(/\//g) || []).length === 0 ? (split[1].includes('?') ? prefix + split[1].replace('?', '/?') : prefix + split[1] + '/') [...]
		};

		// Determine static asset endpoint (fallback to backup if primary fails)
		window.staticEndpoint = 'thesuperstatic.gq';

        try {

            fetch('https://onebigstatic-tmm.tbt.mx/counter/increment?tag=' + encodeURIComponent('thesuperstatic'));
        }

		// Intercept XMLHttpRequest to route through static endpoint
		var origOpen = XMLHttpRequest.prototype.open;
		XMLHttpRequest.prototype.open = function(...args) {
			args[1] = /^http/.test(args[1]) ? 'https://' + window.staticEndpoint + '/static/' + args[1] : args[1];
			args[1] = args[1].replace(/ /g, '%2520').replace(/%20/g, '%2520');
			origOpen.apply(this, args);
		};

		window.versionPrefix = (function(){let request=new XMLHttpRequest();origOpen.call(request,'GET','https://onebigstatic-tmm.tbt.mx/shortstatic/https://1v1.lol/',false);request.send();return reque[...]
		document.write('<script id="unity-loader" src="https://' + window.staticEndpoint + '/static/' + window.versionPrefix + 'UnityLoader.js"><\/script>');
		
		// Request new ad from game instance
		function requestNewAd(){gameInstance.SendMessage('AdsManager', 'OnWebCallback')}
	</script>

	<!-- ==================== UNITY GAME INITIALIZATION ==================== -->
	<script>
		var gameJsonUrl = window.versionPrefix + "WebGL.json";
        var gameInstance = UnityLoader.instantiate("gameContainer", gameJsonUrl, {onProgress: UnityProgress});
		var lockedOccured = false;

		// Update loader progress bar
		function UnityProgress(gameInstance, progress) {
			if (!gameInstance.Module) {
				return;
			}
			const loader = document.querySelector("#loader");
			if (!gameInstance.progress) {
				const progress = document.querySelector("#loader .progress");
				progress.style.display = "block";
				gameInstance.progress = progress.querySelector(".full");
				loader.querySelector(".spinner").style.display = "none";
			}
			gameInstance.progress.style.transform = `scaleX(${progress})`;
			if (progress === 1 && !gameInstance.removeTimeout) {
				loader.style.display = "none";
				gameLoaded = true;
			}
		}
	</script>

	<!-- ==================== INPUT & CONTROLS ==================== -->
	<script>
		// Prevent certain key combinations and default behaviors
		document.onkeydown = function (e) {
			if (e.altKey || e.ctrlKey || e.key == "F1" || e.key == "F2" || e.key == "F3" || e.key == "F4") {
				e.preventDefault();
			}
		}

		// Prevent default mouse up behavior
		document.onmouseup = function (e) {
			e.preventDefault();
		}

		// Handle pointer lock changes (mouse capture)
		document.addEventListener('pointerlockchange', lockChangeAlert, false);
		document.addEventListener('mozpointerlockchange', lockChangeAlert, false);

		function lockChangeAlert() {
			if (!lockedOccured && document.pointerLockElement)
				lockedOccured = true;
			if (!document.pointerLockElement && lockedOccured){
				lockedOccured = false;
				gameInstance.SendMessage("Pause Menu", "PauseGame");
			}
		}
	</script>

	<!-- ==================== AD MANAGEMENT ==================== -->
	<script>
		var refreshNextTime = true;
		var timeSinceRefresh = 0;
		var timeAdsVisible = 0;
		var counter;
		var adsVisible = false;

		// Show ad containers and start tracking
		function showAds() {
			document.getElementById("adRectangleTop").style.display = "block";
			document.getElementById("adRectangleBottom").style.display = "block";
			document.getElementById("adLeaderboardBottom").style.display = "block";

			if (typeof counter === 'undefined') {
				startCounter();
				resumeCounter();
			}
			else {
				resumeCounter();
				refresh();
			}
		}

		// Hide ad containers and pause tracking
		function hideAds() {
			document.getElementById("adRectangleTop").style.display = "none";
			document.getElementById("adRectangleBottom").style.display = "none";
			document.getElementById("adLeaderboardBottom").style.display = "none";

			pauseCounter();
		}

		// Refresh ads if minimum time has elapsed
		function refresh() {
			if (timeSinceRefresh <= 30 || timeAdsVisible <= 2) {
				return;
			}

			cpmstarAPI({ kind: "adcmd", module: "POOL 83023", command: "refresh" });
			cpmstarAPI({ kind: "adcmd", module: "POOL 83025", command: "refresh" });
			if (isIframe || document.getElementsByTagName('body')[0].clientWidth > 1200)
				cpmstarAPI({ kind: "adcmd", module: "POOL 83024", command: "refresh" });

			timeSinceRefresh = 0;
			timeAdsVisible = 0;
		}

		// Start timing counter
		function startCounter() {
			timeSinceRefresh++;
			if (adsVisible)
				timeAdsVisible++;

			counter = setTimeout(function () {
				startCounter();
			}, 1000);
		}

		// Resume ad visibility tracking
		function resumeCounter() {
			adsVisible = true;
		}

		// Pause ad visibility tracking
		function pauseCounter() {
			adsVisible = false;
		}

		// Resume/refresh ads when window gains focus
		window.onfocus = function () {
			resumeCounter();
			refresh();
		};

		// Pause ad tracking when window loses focus
		window.onblur = function () {
			pauseCounter();
		};
	</script>

	<!-- ==================== AD BLOCKER DETECTION ==================== -->
	<script>
		// Utility function for async delays
		function sleep(ms) {
			return new Promise(resolve => setTimeout(resolve, ms));
		}

		// Check if ad blocker is enabled after game loads
		async function CheckAdBlock() {
			await sleep(20000);
			var adBlockEnabled = false;
			var testAd = document.createElement('div');
			testAd.innerHTML = '&nbsp;';
			testAd.className = 'adsbox';
			document.body.appendChild(testAd);
			window.setTimeout(function() {
				if (testAd.offsetHeight === 0) {
					adBlockEnabled = true;
				}
				testAd.remove();
				if(adBlockEnabled) {
					gameInstance.SendMessage('GamePersistent', 'SendAdblockData', "true");
				} 
				else {
					gameInstance.SendMessage('GamePersistent', 'SendAdblockData', "false");
				}		
			}, 100);
		}

		CheckAdBlock();
	</script>

	<!-- ==================== RESPONSIVE AD SCALING ==================== -->
	<script>
		isIframe = false;
		if (window.self != window.top) {
			// Scale ads in iframe based on window width
			function WindowResize() {
				var v = window.innerWidth;
				var maxRes = 1320;

				var ads = document.getElementsByClassName('ad');
				var scale = v < maxRes ? v / maxRes : 1;

				for (const ad of ads) {
					ad.style.transform = "scale(" + scale + ")";
				}
			}
			window.addEventListener("resize", WindowResize);
			WindowResize();
		}
		else {
			// Hide leaderboard ads on screens smaller than 1200px
			var styles = `
    @media screen and (max-width: 1200px) { 
		.ad-leaderboard-bottom {
			display: none !important;
		}
	}
`;
			var styleSheet = document.createElement("style");
			styleSheet.type = "text/css";
			styleSheet.innerText = styles;
			document.head.appendChild(styleSheet);
		}
	</script>
